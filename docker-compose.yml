services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  metabase:
    image: ${METABASE_IMAGE:-metabase/metabase:v0.61.2}
    depends_on:
      - postgres
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    ports:
      - "3000:3000"
    volumes:
      - metabase-data:/metabase-data

  mcp:
    build: .
    depends_on:
      - metabase
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - mcp-data:/data

volumes:
  postgres-data:
  metabase-data:
  mcp-data:

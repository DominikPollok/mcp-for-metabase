name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          cache-suffix: test-${{ matrix.python-version }}
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest

  registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          cache-suffix: registry
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: uv run python scripts/build_api_registry.py --openapi src/mcp_for_metabase/openapi.json
      - run: git diff --exit-code src/mcp_for_metabase/api_registry.json src/mcp_for_metabase/openapi.json docs/API_COVERAGE.md

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker compose config --quiet
      - run: docker build -t mcp-for-metabase:ci .
      - run: |
          docker run --rm mcp-for-metabase:ci python -c "import asyncio; from mcp_for_metabase.registry import ApiRegistry, OpenApiSpec; from mcp_for_metabase.server import create_mcp; mcp = create_mcp(); tools = asyncio.run(mcp.list_tools()); assert len(ApiRegistry.load_default().operations) == 600; assert len(OpenApiSpec.load_default().spec.get('paths', {})) == 484; assert len(tools) >= 100"

  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        metabase-version: ["v0.59.7", "v0.60.6", "v0.61.2"]
    env:
      METABASE_IMAGE: metabase/metabase:${{ matrix.metabase-version }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          cache-suffix: integration-${{ matrix.metabase-version }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: docker compose up -d postgres metabase
      - run: uv run python scripts/bootstrap_metabase_test_instance.py --output-env .metabase-test.env
      - run: |
          set -a
          . ./.metabase-test.env
          set +a
          uv run pytest tests/integration -q --no-cov
      - if: always()
        run: docker compose logs --tail=200 metabase
      - if: always()
        run: docker compose down -v

  package:
    runs-on: ubuntu-latest
    needs: [test, registry, docker, integration]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          cache-suffix: package
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: uv run python -m build
      - run: uv run twine check dist/*
